---
- name: Install git on local
  hosts: localhost
  gather_facts: false

  tasks:
   - name: Verify the git existance on target
     ansible.builtin.command: git --version
     register: git_check
     ignore_errors: true
     failed_when: false
     changed_when: false

   - name: Debug git presence
     ansible.builtin.debug:
       msg: "Git is already installed: {{ git_check.stdout }}"
     when: git_check.rc == 0

   - name: Git install on ubuntu
     ansible.builtin.apt:
       name: git
       state: present
       update_cache: true
     become: yes
     become_user: root
     when: 
       - git_check.rc != 0

   - name: Confirm git installation
     ansible.builtin.command: git --version
     register: git_verify
     changed_when: false

   - name: Verify git installed
     ansible.builtin.debug:
       msg: "git installed successfully: {{ git_verify.stdout }}"
     when: git_verify.rc == 0

...
